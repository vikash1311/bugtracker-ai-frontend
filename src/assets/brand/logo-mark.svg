<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="BugTracker AI logo">
  <!-- background -->
  <rect width="64" height="64" rx="14" fill="#0A0E14"/>

  <!-- outer radar rings -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#1C2330" stroke-width="1"/>
  <circle cx="32" cy="32" r="17" fill="none" stroke="#1C2330" stroke-width="1"/>

  <!-- sweep arc — flat, no gradient -->
  <path d="M32 8 A24 24 0 0 1 53.78 20" fill="none" stroke="#E94F37" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
  <line x1="32" y1="32" x2="32" y2="8" stroke="#E94F37" stroke-width="1.5" stroke-linecap="round"/>

  <!-- crosshair ticks -->
  <line x1="32" y1="3" x2="32" y2="8" stroke="#2A3342" stroke-width="1.25"/>
  <line x1="32" y1="56" x2="32" y2="61" stroke="#2A3342" stroke-width="1.25"/>
  <line x1="3" y1="32" x2="8" y2="32" stroke="#2A3342" stroke-width="1.25"/>
  <line x1="56" y1="32" x2="61" y2="32" stroke="#2A3342" stroke-width="1.25"/>

  <!-- bug node: hexagonal abstraction -->
  <g transform="translate(32,32)">
    <line x1="-6" y1="-3.5" x2="-12" y2="-7" stroke="#E94F37" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-6" y1="3.5" x2="-12" y2="7" stroke="#E94F37" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="-3.5" x2="12" y2="-7" stroke="#E94F37" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="3.5" x2="12" y2="7" stroke="#E94F37" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="0,-8 7,-4 7,4 0,8 -7,4 -7,-4" fill="#E94F37"/>
    <polygon points="0,-8 7,-4 7,4 0,8 -7,4 -7,-4" fill="none" stroke="#0A0E14" stroke-width="1"/>
  </g>
</svg>

